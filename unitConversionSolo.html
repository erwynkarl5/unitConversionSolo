<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="unitConversionSolo.css">
    <style>


    </style>
</head>

<body>

    <div class="heading">
        <h1 class="title">Metric/Imperial Unit Conversion</h1>
        <input type="number" id="unit-input" min="0">
        <button id="convert-btn">Convert</button>
    </div>

    <div class="results-container">
        <div class="card" >
            <h2>Length(Meter/Feet)</h2>
            <p id="length-el" class="para"></p>

        </div>
        <div class="card">
            <h2>Volume(Liters/Gallons)</h2>
            <p id="volume-el" class="para"></p>

        </div>
        <div class="card">
            <h2>Mass(Kilograms/Pounds)</h2>
            <p id="mass-el" class="para"></p>

        </div>

    </div>


    <script src="unitConversionSolo.js">
        // 1 meter = 3.281 feet
        // 1 liter = 0.264 gallon
        // 1 kilogram = 2.204 pound
   

    </script>
</body>

</html>
